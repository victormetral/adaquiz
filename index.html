<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdaQuiz</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ═══════════════════════════════════════
       ÉCRAN 1 — ACCUEIL
       Affiché au départ. Caché quand on clique sur "Commencer".
  ════════════════════════════════════════ -->
  <section id="ecran-accueil" class="ecran">

  </section>

  <!-- ═══════════════════════════════════════
       ÉCRAN 2 — QUESTION
       Caché au départ. Affiché pendant le quiz.
  ════════════════════════════════════════ -->
  <section id="ecran-question" class="ecran cache">

  </section>

  <!-- ═══════════════════════════════════════
       ÉCRAN 3 — RÉSULTATS
       Caché au départ. Affiché à la fin du quiz.
  ════════════════════════════════════════ -->
  <section id="ecran-resultats" class="ecran cache">

  </section>

  <script src="script.js" defer></script>
</body>

</html>
